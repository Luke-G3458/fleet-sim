<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer Frame -->
  <rect x="64" y="64" width="384" height="384" 
        fill="#1e1916" 
        stroke="#443d35" 
        stroke-width="6"
        rx="34"/>

  <!-- Subtle Grid / Navigation Lines -->
  <line x1="118" y1="256" x2="394" y2="256"
        stroke="#d1664a"
        stroke-width="4"
        stroke-dasharray="6 10"/>

  <line x1="256" y1="128" x2="256" y2="384"
        stroke="#d1664a"
        stroke-width="4"
        stroke-dasharray="6 10"/>

  <!-- AMR Body -->
  <rect x="176" y="208" width="160" height="96"
        rx="20"
        fill="#443d35"/>

  <!-- Top Sensor (LIDAR Dome) -->
  <circle cx="256" cy="256" r="18"
          fill="#d1664a"/>

  <!-- Sensor Ring Glow -->
  <circle cx="256" cy="256" r="32"
          fill="none"
          stroke="#d1664a"
          stroke-opacity="0.25"
          stroke-width="4"/>

</svg>
